<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Pipeline · IoV Wi-Fi Security Testing</title>
<link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
<link rel="stylesheet" href="{{ url_for('static', filename='css/flow.css') }}">
<script src="https://cdn.socket.io/4.7.5/socket.io.min.js"></script>
</head>
<body class="flow-body">
<header class="topbar">
  <div class="brand">
    <span class="logo">◉</span>
    <div>
      <h1>檢測流程 Pipeline</h1>
      <small>二、研究方法與實施步驟 &middot; AP 模式 / Client·Station 模式</small>
    </div>
  </div>
  <div class="status">
    <a href="{{ url_for('index') }}" class="flow-link">Classic Dashboard</a>
    <span id="conn-dot" class="dot"></span>
    <span id="conn-text">connecting…</span>
  </div>
</header>

<!-- run controls -->
<div class="run-bar">
  <div class="run-config">
    <label>監聽介面 Interface
      <select id="cfg-iface"><option value="wlan0">wlan0</option></select>
    </label>
    <label>受測 T-BOX BSSID <small>(留空則自動掃描選定)</small>
      <input id="cfg-bssid" placeholder="auto-detect">
    </label>
    <label class="check-option">
      <input id="cfg-client-mode" type="checkbox" checked>
      <span>執行 Client / Station 模式</span>
    </label>
  </div>
  <div class="run-actions">
    <button id="run-btn" class="primary big">▶ 開始檢測 Run</button>
    <button id="reset-btn" class="ghost">↺ Reset</button>
  </div>
</div>

<main class="flow-main">
  <!-- ======================================= PIPELINE OF CARDS -->
  <div class="pipeline" id="pipeline">
    <!-- stage cards injected by JS -->
  </div>

  <!-- ======================================= PROGRESS + LOGS -->
  <section class="dock">
    <div class="dock-head" id="dock-head">
      <div class="dock-title">
        <span class="dock-icon">▤</span>
        <span>進度與即時日誌 · Progress &amp; Logs</span>
        <span id="dock-stat" class="dock-stat">idle</span>
      </div>
      <span class="chevron" id="dock-chevron">⌄</span>
    </div>

    <div class="progress-wrap">
      <div class="progress-track">
        <div class="progress-fill" id="progress-fill"></div>
      </div>
      <span class="progress-label" id="progress-label">0%</span>
    </div>

    <div class="dock-body" id="dock-body">
      <div class="log-toolbar">
        <span id="log-count" class="log-count">0 lines</span>
        <button id="log-clear" class="ghost sm">clear</button>
      </div>
      <div class="logstream" id="logstream">
        <div class="log-empty">尚無活動 — 按下 <b>開始檢測</b> 以執行檢測流程。</div>
      </div>
    </div>
  </section>
</main>

<script src="{{ url_for('static', filename='js/flow.js') }}"></script>
</body>
</html>
